name: Android Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload APK to, e.g. v0.1.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --workspace @tricli/mobile --include-workspace-root
        working-directory: .

      - name: Typecheck mobile app
        run: npx tsc --noEmit --jsx react-jsx --moduleResolution bundler --module esnext --target es2020 --allowSyntheticDefaultImports --skipLibCheck App.tsx src/*.ts

      - name: Generate native Android project
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Configure Android release signing
        run: node scripts/configure-android-signing.cjs
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p ../../dist
          cp android/app/build/outputs/apk/release/app-release.apk ../../dist/tricli-remote-${GITHUB_REF_NAME:-manual}.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tricli-remote-release-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          name: TriCLI Remote ${{ inputs.release_tag || github.ref_name }}
          files: dist/*.apk
          generate_release_notes: true
